{% extends "layout.html" %}

{% block main %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="text-center mb-4">High School Student Registration</h2>
        <form method="post">
            <div class="mb-3">
                <label for="email" class="form-label">School Email</label>
                <input type="email" class="form-control" id="email" name="email" 
                       placeholder="id_number@philasd.org" required>
                <small class="form-text text-muted">Must end with @philasd.org</small>
            </div>
            
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control" id="username" name="username" required>
            </div>
            
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>
            
            <div class="mb-3">
                <label for="confirmation" class="form-label">Confirm Password</label>
                <input type="password" class="form-control" id="confirmation" name="confirmation" required>
            </div>
            
            <button type="submit" class="btn btn-primary w-100">Register</button>
        </form>
        
        <p class="text-center mt-3">
            Already have an account? <a href="/login?type=highschool">Login here</a>
        </p>
    </div>
</div>
{% endblock %}
