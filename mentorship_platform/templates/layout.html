<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"> <!--something unique that is like common to do when coding it; it is similar to ASCII-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mentorship Platform</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <!-- Flash messages -->
     <!-- Similiar to the error message we saw in cs50 finance -->
     <!--this section is to accommdate flask's built in flash messages that automactically appear when using the flash() function-->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <!-- Main content -->
     <!--GPTed for spacing-->
    <div class="container mt-4">
        {% block main %}{% endblock %}
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
